<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мухурта Калькулятор</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
#muh{font-family:'Noto Sans',sans-serif;background:#faf6ef;color:#1c100a;max-width:960px;margin:0 auto;padding:1.5rem 1rem;}
#muh *{box-sizing:border-box;margin:0;padding:0;}
#muh a{color:inherit;}
/* HEADER */
#muh .hdr{text-align:center;margin-bottom:1.6rem;padding-bottom:1.4rem;border-bottom:2px solid rgba(180,140,60,.22);}
#muh .hdr-logo{display:flex;justify-content:center;margin-bottom:.6rem;}
#muh .hdr-logo svg{width:220px;height:auto;display:block;}
#muh .hdr-t{font-family:'Libre Baskerville',serif;font-size:1.75rem;color:#6e2806;}
#muh .hdr-s{color:#9e7840;font-size:.8rem;margin-top:.25rem;letter-spacing:.06em;}
#muh .hdr-copy{color:#9e7840;font-size:.72rem;margin-top:.55rem;letter-spacing:.04em;opacity:.7;}
#muh .day-card-header{display:flex;align-items:flex-start;gap:.6rem;cursor:pointer;width:100%;}
#muh .day-detail{padding:.8rem 0 .3rem;border-top:1px solid rgba(180,140,60,.18);margin-top:.5rem;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* Calendar */
#muh .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:.5rem;}
#muh .cal-head{text-align:center;font-size:.65rem;font-weight:700;color:#9e7840;padding:.25rem 0;text-transform:uppercase;letter-spacing:.05em;}
#muh .cal-day{border-radius:8px;padding:.35rem .25rem;cursor:pointer;transition:all .15s;border:1px solid transparent;min-height:58px;display:flex;flex-direction:column;align-items:center;gap:2px;}
#muh .cal-day:hover{border-color:rgba(180,140,60,.4);transform:translateY(-1px);}
#muh .cal-day.sel{border-color:#c8600a;box-shadow:0 2px 8px rgba(200,96,10,.25);}
#muh .cal-day.empty{background:none;cursor:default;}
#muh .cal-day.empty:hover{border-color:transparent;transform:none;}
#muh .cal-num{font-size:.72rem;font-weight:700;color:#6e2806;}
#muh .cal-nak{font-size:.52rem;color:#9e7840;text-align:center;line-height:1.2;}
#muh .cal-ls{font-size:.5rem;color:#9e7840;}
#muh .cal-dot{width:6px;height:6px;border-radius:50%;margin-top:1px;}
#muh .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
#muh .cal-nav button{background:none;border:1px solid rgba(180,140,60,.3);border-radius:6px;padding:.3rem .7rem;cursor:pointer;color:#6e2806;font-size:.8rem;}
#muh .cal-nav button:hover{background:rgba(180,140,60,.1);}
#muh .cal-legend{display:flex;gap:.8rem;flex-wrap:wrap;font-size:.65rem;color:#9e7840;margin-top:.5rem;}
#muh .cal-legend span{display:flex;align-items:center;gap:.25rem;}
/* Energy of day panel */
#muh .energy-panel{background:#faf6ef;border:1px solid rgba(180,140,60,.22);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
#muh .energy-tabs{display:flex;gap:.4rem;margin-bottom:.85rem;border-bottom:1px solid rgba(180,140,60,.18);padding-bottom:.6rem;}
#muh .etab{background:none;border:none;font-family:inherit;font-size:.78rem;padding:.3rem .7rem;border-radius:6px;cursor:pointer;color:#9e7840;transition:background .15s,color .15s;}
#muh .etab.on{background:#6e2806;color:#fff;font-weight:600;}
/* Filter UI */
#muh .filter-toggle{display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.78rem;color:#9e7840;padding:.3rem 0;user-select:none;}
#muh .filter-toggle:hover{color:#6e2806;}
#muh .filter-panel{background:#faf6ef;border:1px solid rgba(180,140,60,.2);border-radius:10px;padding:.85rem 1rem;margin-top:.5rem;}
#muh .filter-section{margin-bottom:.8rem;}
#muh .filter-section:last-child{margin-bottom:0;}
#muh .filter-lbl{font-size:.7rem;font-weight:700;color:#6e2806;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
#muh .ftag{display:inline-flex;align-items:center;font-size:.68rem;padding:.2rem .5rem;border-radius:4px;border:1px solid rgba(180,140,60,.3);background:#fff;color:#6e2806;cursor:pointer;margin:.15rem;transition:all .15s;}
#muh .ftag.on{background:#6e2806;color:#fff;border-color:#6e2806;}
#muh .ftag-bad.on{background:#8a1a1e;border-color:#8a1a1e;color:#fff;}
#muh .filter-clear{font-size:.7rem;color:#9e7840;cursor:pointer;text-decoration:underline;margin-left:.5rem;}
#muh .filter-clear:hover{color:#6e2806;}
/* CARD */
#muh .card{background:#fff;border:1px solid rgba(180,140,60,.22);border-radius:11px;padding:1.2rem;box-shadow:0 2px 10px rgba(180,140,60,.07);margin-bottom:.85rem;}
#muh .ct{font-family:'Libre Baskerville',serif;font-size:.9rem;color:#6e2806;margin-bottom:.75rem;display:flex;align-items:center;gap:.45rem;}
#muh .ct::after{content:"";flex:1;height:1px;background:rgba(180,140,60,.22);}
/* CATEGORIES */
#muh .catg{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;}
#muh .catb{background:#faf6ef;border:1.5px solid rgba(180,140,60,.22);border-radius:9px;padding:.75rem .45rem;cursor:pointer;text-align:center;transition:all .18s;position:relative;user-select:none;}
#muh .catb:hover,#muh .catb.on{border-color:#c8600a;background:#fdf4e3;box-shadow:0 0 0 3px rgba(200,96,10,.1);}
#muh .catb-icon{font-size:1.4rem;display:block;margin-bottom:.22rem;}
#muh .catb-lbl{font-size:.71rem;color:#6a4820;font-weight:500;line-height:1.3;}
#muh .cat-chk{position:absolute;top:.35rem;right:.35rem;width:15px;height:15px;background:#c8600a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;color:#fff;}
/* EVENT LIST */
#muh .evlist{display:flex;flex-direction:column;gap:.45rem;}
#muh .evb{background:#faf6ef;border:1.5px solid rgba(180,140,60,.22);border-radius:8px;padding:.65rem 1rem;cursor:pointer;text-align:left;font-family:'Noto Sans',sans-serif;font-size:.84rem;color:#6a4820;font-weight:500;transition:all .18s;width:100%;}
#muh .evb:hover,#muh .evb.on{border-color:#c8600a;background:#fdf4e3;color:#6e2806;}
#muh .ev-note{background:linear-gradient(135deg,#fef8ec,#f5ede0);border:1px solid rgba(200,96,10,.15);border-radius:7px;padding:.65rem .85rem;font-size:.77rem;color:#6a4820;line-height:1.55;margin-top:.5rem;}
#muh .ev-note strong{color:#6e2806;display:block;margin-bottom:.2rem;}
/* CUSTOM BUILDER */
#muh .qual-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem;}
#muh .qc{background:#faf6ef;border:1.5px solid rgba(180,140,60,.22);border-radius:7px;padding:.55rem .75rem;cursor:pointer;display:flex;align-items:flex-start;gap:.5rem;transition:all .18s;user-select:none;}
#muh .qc.on{border-color:#c8600a;background:#fdf4e3;}
#muh .qbox{width:15px;height:15px;min-width:15px;border:1.5px solid rgba(180,140,60,.4);border-radius:3px;margin-top:.1rem;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:all .18s;}
#muh .qc.on .qbox{background:#c8600a;border-color:#c8600a;color:#fff;}
#muh .qtext{font-size:.76rem;color:#6a4820;line-height:1.4;}
#muh .qc.on .qtext{color:#6e2806;}
#muh .vara-row{display:flex;gap:.38rem;flex-wrap:wrap;margin-bottom:.6rem;}
#muh .vchip{background:#faf6ef;border:1.5px solid rgba(180,140,60,.22);border-radius:99px;padding:.26rem .65rem;cursor:pointer;font-size:.74rem;font-weight:600;transition:all .18s;user-select:none;}
/* MODE TOGGLE */
#muh .mode-tabs{display:flex;gap:0;background:#f3ead6;border-radius:8px;padding:3px;margin-bottom:.8rem;}
#muh .mode-tab{flex:1;padding:.52rem;text-align:center;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;color:#9e7840;transition:all .18s;border:none;background:none;font-family:'Noto Sans',sans-serif;}
#muh .mode-tab.on{background:#fff;color:#6e2806;box-shadow:0 1px 4px rgba(180,140,60,.15);}
/* FORM */
#muh .fg3{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;}
#muh .fld{display:flex;flex-direction:column;gap:.26rem;}
#muh .lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:#9e7840;font-weight:600;}
#muh .inp{background:#faf6ef;border:1px solid rgba(180,140,60,.22);border-radius:7px;padding:.5rem .75rem;color:#1c100a;font-family:'Noto Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;width:100%;}
#muh .inp:focus{border-color:#c8600a;}
#muh select.inp option{background:#faf6ef;}
/* PRESETS */
#muh .presets{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.55rem;align-items:center;}
#muh .preset{background:#faf6ef;border:1px solid rgba(180,140,60,.22);border-radius:99px;padding:.26rem .72rem;cursor:pointer;font-size:.75rem;color:#6a4820;transition:all .18s;font-family:'Noto Sans',sans-serif;border:1px solid rgba(180,140,60,.22);}
#muh .preset:hover{border-color:#c8600a;color:#6e2806;}
#muh .preset-lbl{font-size:.72rem;color:#9e7840;}
/* PROGRESS */
#muh .prog-wrap{background:#e8ddc5;border-radius:99px;height:4px;overflow:hidden;margin-top:.3rem;}
#muh .prog-fill{height:100%;background:linear-gradient(90deg,#c8600a,#6e2806);border-radius:99px;transition:width .3s;}
/* BUTTON */
#muh .btn-m{display:block;width:100%;padding:.62rem 1.4rem;border:none;border-radius:7px;cursor:pointer;font-family:'Noto Sans',sans-serif;font-weight:700;font-size:.88rem;background:linear-gradient(135deg,#c8600a,#6e2806);color:#fff;margin-top:.45rem;transition:all .2s;letter-spacing:.02em;}
#muh .btn-m:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,96,10,.28);}
#muh .btn-m:disabled{opacity:.55;cursor:wait;}
/* PANCHANGA */
#muh .g5{display:grid;grid-template-columns:repeat(5,1fr);gap:.55rem;}
#muh .pk{background:#faf6ef;border:1px solid rgba(180,140,60,.22);border-radius:7px;padding:.6rem .5rem;text-align:center;}
#muh .pk-l{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:#9e7840;margin-bottom:.18rem;}
#muh .pk-v{font-family:'Libre Baskerville',serif;font-size:.83rem;color:#6e2806;font-weight:700;line-height:1.3;}
#muh .pk-s{font-size:.6rem;color:#9e7840;margin-top:.1rem;}
#muh .nkd{background:linear-gradient(135deg,#fef8ec,#f5ede0);border:1px solid rgba(180,140,60,.22);border-radius:9px;padding:.8rem;display:flex;gap:.8rem;align-items:flex-start;margin-top:.65rem;}
#muh .nk-name{font-family:'Libre Baskerville',serif;font-size:1rem;color:#6e2806;}
#muh .nk-meta{display:flex;gap:.38rem;flex-wrap:wrap;margin-top:.25rem;}
#muh .nkb{font-size:.66rem;background:rgba(200,96,10,.09);color:#6e2806;border-radius:4px;padding:.1rem .36rem;}
/* SCORE */
#muh .scw{display:flex;align-items:center;gap:1.1rem;flex-wrap:wrap;}
#muh .scc{position:relative;flex-shrink:0;}
#muh .scc svg{display:block;}
#muh .scn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;}
#muh .scb{font-size:1.65rem;font-weight:700;line-height:1;}
#muh .scl{font-size:.6rem;color:#9e7840;text-transform:uppercase;letter-spacing:.05em;}
#muh .scrs{flex:1;min-width:160px;}
#muh .scr{display:flex;justify-content:space-between;padding:.28rem 0;border-bottom:1px solid rgba(180,140,60,.22);font-size:.78rem;}
#muh .scr:last-child{border-bottom:none;}
/* TIMELINE */
#muh .tlb{display:flex;height:28px;border-radius:5px;overflow:hidden;border:1px solid rgba(180,140,60,.22);margin-top:.4rem;position:relative;}
#muh .tls{flex:1;position:relative;cursor:pointer;}
#muh .tls:hover{filter:brightness(1.1);}
#muh .tlt{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);background:#1c100a;color:#fff;font-size:.63rem;padding:.22rem .46rem;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none;opacity:0;transition:opacity .15s;}
#muh .tls:hover .tlt{opacity:1;}
#muh .tll{display:flex;justify-content:space-between;font-size:.62rem;color:#9e7840;margin-top:.25rem;}
/* PERIODS */
#muh .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;}
#muh .inaus{background:#fff4f4;border:1px solid rgba(138,26,30,.16);border-radius:7px;padding:.65rem;text-align:center;}
#muh .in-l{font-size:.66rem;color:#8a1a1e;font-weight:700;margin-bottom:.18rem;}
#muh .in-t{font-family:'Libre Baskerville',serif;font-size:.88rem;color:#1c100a;}
#muh .in-n{font-size:.63rem;color:#9e7840;margin-top:.12rem;}
#muh .good-p{background:#f0fff7;border-color:rgba(30,107,61,.2);}
#muh .good-p .in-l{color:#1e6b3d;}
/* RANGE RESULTS */
#muh .range-top{margin-bottom:.6rem;font-size:.8rem;color:#9e7840;}
#muh .day-cards{display:flex;flex-direction:column;gap:.55rem;}
#muh .day-card{border:1.5px solid rgba(180,140,60,.22);border-radius:10px;padding:.85rem 1rem;display:flex;align-items:center;gap:.9rem;cursor:pointer;transition:all .18s;background:#fff;}
#muh .day-card:hover{border-color:#c8600a;box-shadow:0 2px 10px rgba(180,140,60,.12);}
#muh .day-card.sel{border-color:#c8600a;background:#fdf4e2;}
#muh .day-rank{font-family:'Libre Baskerville',serif;font-size:1.2rem;font-weight:700;color:rgba(180,140,60,.4);min-width:1.8rem;text-align:center;}
#muh .day-rank.top{color:#c8600a;}
#muh .day-date{font-family:'Libre Baskerville',serif;font-size:.92rem;color:#1c100a;font-weight:700;}
#muh .day-sub{font-size:.72rem;color:#9e7840;margin-top:.1rem;}
#muh .day-score-num{font-family:'Libre Baskerville',serif;font-size:1.35rem;font-weight:700;}
#muh .day-score-lbl{font-size:.66rem;color:#9e7840;text-align:right;}
#muh .day-tags{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.3rem;}
#muh .dtag{font-size:.63rem;padding:.07rem .32rem;border-radius:3px;background:rgba(200,96,10,.08);color:#6e2806;}
/* BEST SLOTS */
#muh .slg{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
#muh .slot{background:#faf6ef;border:1.5px solid rgba(180,140,60,.22);border-radius:9px;padding:.75rem;transition:all .18s;}
#muh .sl-top{font-size:.6rem;font-weight:700;letter-spacing:.06em;color:#c8600a;margin-bottom:.18rem;}
#muh .sl-t{font-family:'Libre Baskerville',serif;font-size:.98rem;color:#1c100a;font-weight:700;}
#muh .sl-s{font-size:.71rem;font-weight:600;margin-top:.12rem;}
#muh .sl-tags{margin-top:.35rem;display:flex;flex-wrap:wrap;gap:.2rem;}
#muh .stag{font-size:.61rem;background:rgba(200,96,10,.08);color:#6e2806;border-radius:3px;padding:.07rem .32rem;}
/* MISC */
#muh .srrow{display:flex;gap:.9rem;flex-wrap:wrap;font-size:.76rem;color:#6a4820;background:#f3ead6;border-radius:7px;padding:.48rem .8rem;border:1px solid rgba(180,140,60,.22);margin-bottom:.7rem;}
#muh .srit{display:flex;align-items:center;gap:.25rem;}
#muh .warn{background:#fff4f4;border:1px solid rgba(138,26,30,.25);border-radius:7px;padding:.7rem .85rem;font-size:.8rem;color:#8a1a1e;}
#muh .warn strong{display:block;margin-bottom:.18rem;font-size:.83rem;}
#muh .orn{text-align:center;color:#c8600a;letter-spacing:.5em;margin:.9rem 0;opacity:.4;font-size:.85rem;}
#muh hr.dv{border:none;border-top:1px solid rgba(180,140,60,.22);margin:.8rem 0;}
#muh .mt1{margin-top:.5rem;}
#muh .mt2{margin-top:1rem;}
#muh .name-inp{background:#faf6ef;border:1px solid rgba(180,140,60,.22);border-radius:7px;padding:.5rem .75rem;color:#1c100a;font-family:'Noto Sans',sans-serif;font-size:.86rem;outline:none;width:100%;transition:border-color .2s;}
#muh .name-inp:focus{border-color:#c8600a;}
/* RESPONSIVE */
@media(max-width:640px){
  #muh .catg{grid-template-columns:repeat(3,1fr);}
  #muh .fg3{grid-template-columns:1fr 1fr;}
  #muh .g5{grid-template-columns:repeat(3,1fr);}
  #muh .slg{grid-template-columns:1fr;}
  #muh .day-card{flex-wrap:wrap;}
  #muh .qual-grid{grid-template-columns:1fr;}
}
@media(max-width:400px){
  #muh .catg{grid-template-columns:repeat(2,1fr);}
  #muh .g3{grid-template-columns:1fr 1fr;}
  #muh .fg3{grid-template-columns:1fr;}
}
</style>
</head>

function calcKarana(mS,sS){
  var k=Math.floor(n360(mS-sS)/6);
  var idx;
  if(k===0) idx=0; // Kimstughna
  else if(k>=1&&k<=56) idx=((k-1)%7)+1; // 7 movable
  else if(k===57) idx=8; // Shakuni
  else if(k===58) idx=9; // Chatushpada
  else idx=10; // Naga
  return {karana:KARANAS[idx],kIdx:idx};
}

// --- ASTRONOMY (NOAA, +-1 min) -------------------------------------------------
var toR=function(d){return d*Math.PI/180;};
var toD=function(r){return r*180/Math.PI;};
var n360=function(x){return((x%360)+360)%360;};

function jday(y,m,d,utH){
  utH=utH||12;
  if(m<=2){y--;m+=12;}
  var A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+utH/24+B-1524.5;
}

function solarData(JD){
  var T=(JD-2451545)/36525;
  var L0=n360(280.46646+36000.76983*T+0.0003032*T*T);
  var M=n360(357.52911+35999.05029*T-0.0001537*T*T);
  var e=0.016708634-0.000042037*T;
  var Mr=toR(M);
  var C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  var sl=L0+C;
  var om=n360(125.04-1934.136*T);
  var al=sl-0.00569-0.00478*Math.sin(toR(om));
  var eps=23.439-0.00000036*T*36525+0.00256*Math.cos(toR(om));
  var decl=toD(Math.asin(Math.sin(toR(eps))*Math.sin(toR(al))));
  var y2=Math.pow(Math.tan(toR(eps/2)),2);
  var EqT=4*toD(y2*Math.sin(2*toR(L0))-2*e*Math.sin(Mr)+4*e*y2*Math.sin(Mr)*Math.cos(2*toR(L0))-0.5*y2*y2*Math.sin(4*toR(L0))-1.25*e*e*Math.sin(2*Mr));
  return{decl:decl,EqT:EqT};
}

function sunTimes(year,month,day,lat,lon,tz){
  var JD=jday(year,month,day,12);
  var sd=solarData(JD);
  var cosHA=(Math.cos(toR(90.833))-Math.sin(toR(lat))*Math.sin(toR(sd.decl)))/(Math.cos(toR(lat))*Math.cos(toR(sd.decl)));
  var noonMin=720-4*lon-sd.EqT+tz*60;
  if(cosHA>1)return{sunrise:null,sunset:null,noon:noonMin/60,EqT:sd.EqT};
  if(cosHA<-1)return{sunrise:0,sunset:24,noon:noonMin/60,EqT:sd.EqT};
  var HA=toD(Math.acos(cosHA));
  return{sunrise:(noonMin-4*HA)/60,sunset:(noonMin+4*HA)/60,noon:noonMin/60,EqT:sd.EqT};
}

function lahiri(JD){var T=(JD-2451545)/36525;return 23.8530+1.397*T;}

function sunLon(JD){
  var T=(JD-2451545)/36525;
  var L0=n360(280.46646+36000.76983*T+0.0003032*T*T);
  var M=n360(357.52911+35999.05029*T-0.0001537*T*T);
  var Mr=toR(M);
  var C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  return n360(L0+C);
}

function moonLon(JD){
  var T=(JD-2451545)/36525;
  var L=n360(218.3165+481267.8813*T);
  var M=n360(357.5291+35999.0503*T);
  var Mp=n360(134.9634+477198.8676*T);
  var D=n360(297.8502+445267.1115*T);
  var F=n360(93.2721+483202.0175*T);
  var lo=L;
  lo+=6.2888*Math.sin(toR(Mp));lo-=1.2740*Math.sin(toR(2*D-Mp));lo+=0.6583*Math.sin(toR(2*D));
  lo+=0.2136*Math.sin(toR(2*Mp));lo-=0.1851*Math.sin(toR(M));lo-=0.1143*Math.sin(toR(2*F));
  lo+=0.0588*Math.sin(toR(2*D-2*Mp));lo+=0.0572*Math.sin(toR(2*D-M-Mp));lo+=0.0533*Math.sin(toR(2*D+Mp));
  lo+=0.0458*Math.sin(toR(2*D-M));lo+=0.0409*Math.sin(toR(Mp-M));lo-=0.0347*Math.sin(toR(Mp+M));
  lo-=0.0302*Math.sin(toR(2*(D-F)));lo+=0.0247*Math.sin(toR(2*D-2*M));lo-=0.0222*Math.sin(toR(2*(D+Mp)));
  return n360(lo);
}

function kala(sr,ss,block){var p=(ss-sr)/8;return{start:sr+(block-1)*p,end:sr+block*p};}

function calcP(dateStr,localH,city){
  var parts=dateStr.split('-');
  var y=+parts[0],m=+parts[1],d=+parts[2];
  var JD=jday(y,m,d,localH-city.tz);
  var ay=lahiri(JD);
  var sS=n360(sunLon(JD)-ay);
  var mS=n360(moonLon(JD)-ay);
  var NAK=360/27;
  var nIdx=Math.floor(mS/NAK)%27;
  var nFrac=(mS%NAK)/NAK;
  var nPada=Math.floor(nFrac*4)+1;
  var tIdx=Math.floor(n360(mS-sS)/12)%30;
  var lunarDay=tIdx%15+1; // 1-15 within paksha
  var paksha=tIdx<15?'Шукла':'Кришна';
  var kData=calcKarana(mS,sS);
  var yIdx=Math.floor(n360(mS+sS)/(360/27))%27;
  var dow=new Date(dateStr).getDay();
  var st=sunTimes(y,m,d,city.lat,city.lon,city.tz);
  var sr=st.sunrise!=null?st.sunrise:6;
  var ss2=st.sunset!=null?st.sunset:18;
  var noon=st.noon||(sr+ss2)/2;
  return{
    sS:sS,mS:mS,ay:ay,nIdx:nIdx,nFrac:nFrac,nPada:nPada,tIdx:tIdx,yIdx:yIdx,dow:dow,
    lunarDay:lunarDay,paksha:paksha,karana:kData.karana,kIdx:kData.kIdx,
    nakshatra:NAKSHATRAS[nIdx],tithi:TITHIS[tIdx],tithiQ:TITHI_Q[tIdx],
    yoga:YOGAS[yIdx],vara:VARAS[dow],
    sunrise:sr,sunset:ss2,noon:noon,EqT:st.EqT||0,
    rahu:kala(sr,ss2,RAHU_B[dow]),gulik:kala(sr,ss2,GULIKA_B[dow]),
    abh:{start:noon-0.4,end:noon+0.4}
  };
}

// --- SCORING -----------------------------------------------------------------
function scoreSlot(localH,p,ev){
  if(localH>=p.rahu.start&&localH<p.rahu.end) return{s:0,tag:"Раху Кала",block:true};
  if(localH>=p.gulik.start&&localH<p.gulik.end) return{s:0,tag:"Гулика Кала",block:true};
  if(YOGA_BLOCKED.indexOf(p.yIdx)>=0) return{s:1,reasons:["Йога "+p.yoga.name+" - неблагоприятна ✗"],block:false};

  var sc=0,R=[];
  if(TITHI_BLOCKED.indexOf(p.tIdx)>=0){sc-=1.5;R.push("Титхи "+p.tithi+" - осложнена ✗");}

  sc+=p.vara.score*0.22;
  if(ev.varaGood&&ev.varaGood.indexOf(p.dow)>=0){sc+=1.2;R.push("День "+p.vara.name+" ✓");}
  if(ev.varaBad&&ev.varaBad.indexOf(p.dow)>=0){sc-=1.0;R.push(p.vara.name+" нежелателен ✗");}

  sc+=p.tithiQ*0.16;
  var tNum=p.tIdx%15;
  if(ev.tithiGood&&ev.tithiGood.indexOf(tNum)>=0){sc+=1.0;R.push("Титхи "+(tNum+1)+" ✓");}
  if(ev.tithiBad&&ev.tithiBad.indexOf(p.tIdx)>=0){sc-=1.0;R.push("Титхи "+p.tithi+" ✗");}

  var nQ={Кшипра:5,Лагху:5,Мриду:5,Стхира:4,Чара:4,Мишра:3,Угра:2,Тикшна:2};
  sc+=(nQ[p.nakshatra.quality]||3)*0.14;
  if(ev.naksGood&&ev.naksGood.indexOf(p.nIdx)>=0){sc+=1.5;R.push(p.nakshatra.name+" ✓");}
  if(ev.naksBad&&ev.naksBad.indexOf(p.nIdx)>=0){sc-=1.5;R.push(p.nakshatra.name+" нежелательна ✗");}

  sc+=p.yoga.s*0.16;
  if(ev.yogaGood&&ev.yogaGood.indexOf(p.yIdx)>=0){sc+=0.8;R.push("Йога "+p.yoga.name+" ✓");}
  else if(p.yoga.s>=5) R.push("Йога "+p.yoga.name+" ✓");
  if(p.yoga.s<=1){sc-=0.8;R.push("Йога "+p.yoga.name+" ✗");}

  if(localH>=p.abh.start&&localH<p.abh.end){sc+=2.0;R.push("Абхиджит ✦");}

  return{s:Math.min(10,Math.max(0,(sc/10)*10)),reasons:R,block:false};
}

function getDaySlots(dateStr,city,ev){
  var p0=calcP(dateStr,12,city);
  var sr=p0.sunrise,ss=p0.sunset,out=[];
  for(var h=Math.max(4,sr-0.5);h<ss+0.5;h+=0.5){
    var p=calcP(dateStr,h,city);
    var sc=scoreSlot(h,p,ev);
    out.push({h:h,p:p,s:sc.s,tag:sc.tag,block:sc.block,reasons:sc.reasons});
  }
  return out;
}

function fmt(h){
  h=((h%24)+24)%24;
  var hh=Math.floor(h),mm=Math.round((h-hh)*60);
  if(mm>=60){hh++;mm=0;}
  return(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
}
function fmtDate(s){
  var d=new Date(s);
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',weekday:'short'});
}
function col(s){return s>=8?'#1e6b3d':s>=6?'#5a8a1a':s>=4?'#9a7000':s>=2?'#a04010':'#8a1a1e';}
function lbl(s){return s>=8?'Отлично':s>=6?'Хорошо':s>=4?'Нейтрально':s>=2?'Слабо':'Неблаг.';}
function colBg(s){return s>=8?'#f0fff7':s>=6?'#f6fce8':s>=4?'#fffbeb':s>=2?'#fff4ed':'#fff4f4';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stars(n,max){max=max||3;var s='';for(var i=0;i<Math.min(n,max);i++)s+='&#9733;';for(var i=Math.min(n,max);i<max;i++)s+='&#9734;';return s;}

function scoreCircleSVG(s,size){
  size=size||80;
  var r=(size-10)/2,c=2*Math.PI*r,f=(s/10)*c,cl=col(s);
  return '<div class="scc" style="width:'+size+'px;height:'+size+'px;">'+
    '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)">'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="#e8ddc5" stroke-width="7"/>'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+cl+'" stroke-width="7" stroke-dasharray="'+f+' '+c+'" stroke-linecap="round"/>'+
    '</svg>'+
    '<div class="scn"><span class="scb" style="color:'+cl+'">'+s.toFixed(1)+'</span></div>'+
    '</div>';
}

function computeBirthNak(){
  var b=S.birth;
  if(!b.date) return -1;
  var h=parseFloat((b.time||'12:00').split(':')[0])+(parseFloat((b.time||'12:00').split(':')[1]||0)/60);
  var city=CITIES[b.cIdx]||CITIES[0];
  var p=calcP(b.date,h,city);
  return p.nIdx;
}

function tarabala(currentNIdx){
  var jn=S.birthNak;
  if(jn<0) return null;
  var pos=((currentNIdx-jn+27)%27)+1; // 1-27
  var tara=((pos-1)%9)+1; // 1-9
  // 1=Janma(mixed), 2=Sampat(good), 3=Vipat(bad), 4=Kshema(good), 5=Pratyak(bad),
  // 6=Sadhana(good), 7=Naidhana(bad), 8=Mitra(good), 9=Param Mitra(good)
  var names=['\u0414\u0436\u0430\u043d\u043c\u0430','\u0421\u0430\u043c\u043f\u0430\u0442','\u0412\u0438\u043f\u0430\u0442','\u041a\u0448\u0435\u043c\u0430','\u041f\u0440\u0430\u0442\u044c\u044f\u043a','\u0421\u0430\u0434\u0445\u0430\u043d\u0430','\u041d\u0430\u0439\u0434\u0445\u0430\u043d\u0430','\u041c\u0438\u0442\u0440\u0430','\u041f\u0430\u0440\u0430\u043c \u041c\u0438\u0442\u0440\u0430'];
  var good=[2,4,6,8,9];
  var bad=[3,5,7];
  return{tara:tara,name:names[tara-1],good:good.indexOf(tara)>=0,bad:bad.indexOf(tara)>=0};
}

function chandrabala(currentNIdx){
  var jn=S.birthNak;
  if(jn<0) return null;
  // Moon sign (rashi) from nakshatra: each rashi = 2.25 naks
  var birthRashi=Math.floor(jn/2.25)%12;
  var currentRashi=Math.floor(currentNIdx/2.25)%12;
  var pos=((currentRashi-birthRashi+12)%12)+1; // 1-12
  var good=[1,3,6,7,10,11];
  return{pos:pos,good:good.indexOf(pos)>=0};
}

function buildTodayEnergy(){
  var city=CITIES[S.cIdx];
  var p=calcP(today,12,city);
  var de=buildDayEnergy(p);
  var tab=S.todayTab||'energy';

  // Auspicious/inauspicious timeline
  var slots=[];
  for(var hh=p.sunrise;hh<p.sunset;hh+=0.5){
    var blocked=false,tag='';
    if(hh>=p.rahu.start&&hh<p.rahu.end){blocked=true;tag='Раху Кала';}
    else if(hh>=p.gulik.start&&hh<p.gulik.end){blocked=true;tag='Гулика';}
    var good=hh>=p.abh.start&&hh<p.abh.end;
    slots.push({h:hh,blocked:blocked,good:good,tag:tag});
  }

  var h='<div class="energy-panel">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">';
  h+='<div style="font-size:.82rem;font-weight:700;color:#6e2806">&#9728; Энергия сегодня</div>';

    var de2=buildDayEnergy(p);

function buildDayEnergy(p){
  var score=0;
  // Nakshatra quality — основной фактор (вес ~0-2.5)
  var nqMap={'\u041a\u0448\u0438\u043f\u0440\u0430':5,'\u041b\u0430\u0433\u0445\u0443':5,'\u041c\u0440\u0438\u0434\u0443':4,'\u0421\u0442\u0445\u0438\u0440\u0430':4,'\u0427\u0430\u0440\u0430':3,'\u041c\u0438\u0448\u0440\u0430':3,'\u0423\u0433\u0440\u0430':2,'\u0422\u0438\u043a\u0448\u043d\u0430':1};
  var nq=nqMap[p.nakshatra.quality]||3;
  score+=nq*0.50;  // 0–2.5 pts

  // Tithi quality (вес ~0-2.0)
  score+=p.tithiQ*0.40;

  // Karana (вес ~0-1.1)
  score+=p.karana.q*0.22;

  // Yoga (вес ~0-0.9)
  score+=p.yoga.s*0.18;

  // Vara — вторичный фактор (вес ~0-1.0)
  score+=p.vara.score*0.20;

  // Штрафы
  if(TITHI_BLOCKED.indexOf(p.tIdx)>=0) score-=1.5;
  if(YOGA_BLOCKED.indexOf(p.yIdx)>=0) score-=1.0;

  // Персональные поправки (Тара Бала + Чандра Бала)
  var taraBonus=0, chandraBonus=0, personalNote='';
  if(S.birthNak>=0){
    var tb=tarabala(p.nIdx);
    if(tb){
      if(tb.good){taraBonus=1.2; personalNote='Тара: '+tb.name+' ✓';}
      else if(tb.bad){taraBonus=-1.2; personalNote='Тара: '+tb.name+' ✗';}
      else{personalNote='Тара: '+tb.name;}
    }
    var cb=chandrabala(p.nIdx);
    if(cb&&cb.good) chandraBonus=0.8;
    else if(cb&&!cb.good) chandraBonus=-0.5;
  }
  score=Math.max(0,Math.min(10,score+taraBonus+chandraBonus));

  var catScores=[];
  CATEGORIES.forEach(function(cat){
    var s=0;
    if(cat.events&&cat.events.length){
      var ev0=cat.events[0];
      if(ev0.varaGood&&ev0.varaGood.indexOf(p.dow)>=0) s+=1.5;
      if(ev0.varaBad&&ev0.varaBad.indexOf(p.dow)>=0) s-=1.5;
      if(ev0.naksGood&&ev0.naksGood.indexOf(p.nIdx)>=0) s+=2;
      if(ev0.naksBad&&ev0.naksBad.indexOf(p.nIdx)>=0) s-=2;
      if(ev0.tithiGood&&ev0.tithiGood.indexOf(p.tIdx%15)>=0) s+=1;
      if(ev0.tithiBad&&ev0.tithiBad.indexOf(p.tIdx)>=0) s-=1;
    }
    s+=score*0.5;
    s=Math.max(0,Math.min(10,s));
    catScores.push({cat:cat,s:s});
  });
  catScores.sort(function(a,b){return b.s-a.s;});
  var good=catScores.filter(function(x){return x.s>=6;});
  var avoid=catScores.filter(function(x){return x.s<4;});
  var neutral=catScores.filter(function(x){return x.s>=4&&x.s<6;});

  var ld=p.lunarDay;
  var phase='';
  if(ld<=3) phase='\u041d\u043e\u0432\u043e\u043b\u0443\u043d\u0438\u0435 \u2014 \u0432\u0440\u0435\u043c\u044f \u0437\u0430\u043c\u044b\u0441\u043b\u043e\u0432 \u0438 \u043f\u043e\u0441\u0435\u0432\u043e\u0432';
  else if(ld<=7) phase='\u0420\u0430\u0441\u0442\u0443\u0449\u0430\u044f \u041b\u0443\u043d\u0430 \u2014 \u0441\u0442\u0430\u0440\u0442 \u0438 \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u0435';
  else if(ld<=11) phase='\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u0440\u043e\u0441\u0442 \u2014 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0438 \u043f\u0440\u043e\u0434\u0432\u0438\u0436\u0435\u043d\u0438\u0435';
  else if(ld<=14) phase='\u041f\u0435\u0440\u0435\u0434 \u043f\u043e\u043b\u043d\u043e\u043b\u0443\u043d\u0438\u0435\u043c \u2014 \u043f\u0438\u043a \u044d\u043d\u0435\u0440\u0433\u0438\u0438';
  else if(ld===15) phase='\u041f\u0443\u0440\u043d\u0438\u043c\u0430 (\u041f\u043e\u043b\u043d\u043e\u043b\u0443\u043d\u0438\u0435) \u2014 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u0438\u0435 \u0438 \u043f\u0438\u043a';
  else if(ld<=17) phase='\u0423\u0431\u044b\u0432\u0430\u044e\u0449\u0430\u044f \u041b\u0443\u043d\u0430 \u2014 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u0438\u0435 \u043d\u0430\u0447\u0430\u0442\u043e\u0433\u043e';
  else if(ld<=22) phase='\u0423\u0431\u044b\u0432\u0430\u044e\u0449\u0430\u044f \u041b\u0443\u043d\u0430 \u2014 \u0430\u043d\u0430\u043b\u0438\u0437 \u0438 \u043a\u043e\u0440\u0440\u0435\u043a\u0446\u0438\u044f';
  else if(ld<=28) phase='\u0422\u0451\u043c\u043d\u0430\u044f \u041b\u0443\u043d\u0430 \u2014 \u043e\u0442\u0434\u044b\u0445 \u0438 \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u044f\u044f \u0440\u0430\u0431\u043e\u0442\u0430';
  else phase='\u0410\u043c\u0430\u0432\u0430\u0441\u044c\u044f \u2014 \u0432\u0440\u0435\u043c\u044f \u043e\u0447\u0438\u0449\u0435\u043d\u0438\u044f';

  var scoreColor=score>=7?'#1e6b3d':score>=5?'#7a5e00':score>=3?'#c8600a':'#8a1a1e';
  var scoreLbl=score>=7?'\u041e\u0442\u043b\u0438\u0447\u043d\u0430\u044f':score>=5?'\u0425\u043e\u0440\u043e\u0448\u0430\u044f':score>=3?'\u041d\u0435\u0439\u0442\u0440\u0430\u043b\u044c\u043d\u0430\u044f':'\u0421\u043b\u0430\u0431\u0430\u044f';
  var pct=Math.round(score/10*100);

  var h='<div class="card" style="border-left:4px solid '+scoreColor+'">';
  h+='<div class="ct">&#9728; \u042d\u043d\u0435\u0440\u0433\u0438\u044f \u0434\u043d\u044f</div>';
  // Circle + info side by side
  h+='<div style="display:flex;align-items:center;gap:1rem;margin-bottom:.8rem">';
  h+=scoreCircleSVG(score,72);
  h+='<div style="flex:1">';
  h+='<div style="font-size:.78rem;font-weight:600;color:'+scoreColor+'">'+scoreLbl+'</div>';
  h+='<div style="font-size:.7rem;color:#9e7840;margin-top:.15rem">'+esc(p.vara.name)+' &middot; '+esc(p.nakshatra.name)+'</div>';
  h+='<div style="font-size:.7rem;color:#9e7840">'+p.lunarDay+' \u043b.\u0441. &middot; '+p.paksha+' &middot; '+esc(p.karana.name)+'</div>';
  h+='</div></div>';
  h+='<div style="font-size:.75rem;color:#9e7840;margin-bottom:.75rem;padding:.35rem .6rem;background:rgba(158,120,64,.08);border-radius:6px;">&#9405; '+phase+'</div>';
  if(good.length>0){
    h+='<div style="margin-bottom:.6rem"><div style="font-size:.7rem;font-weight:700;color:#1e6b3d;margin-bottom:.3rem">&#10003; \u0425\u043e\u0440\u043e\u0448\u043e \u043f\u043e\u0434\u0445\u043e\u0434\u0438\u0442 \u0434\u043b\u044f:</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:.3rem">';
    good.forEach(function(x){h+='<span style="font-size:.68rem;background:rgba(30,107,61,.1);color:#1e6b3d;border-radius:4px;padding:.15rem .45rem">'+x.cat.icon+' '+esc(x.cat.label)+'</span>';});
    h+='</div></div>';
  }
  if(neutral.length>0){
    h+='<div style="margin-bottom:.6rem"><div style="font-size:.7rem;font-weight:700;color:#7a5e00;margin-bottom:.3rem">~ \u041d\u0435\u0439\u0442\u0440\u0430\u043b\u044c\u043d\u043e:</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:.3rem">';
    neutral.forEach(function(x){h+='<span style="font-size:.68rem;background:rgba(122,94,0,.08);color:#7a5e00;border-radius:4px;padding:.15rem .45rem">'+x.cat.icon+' '+esc(x.cat.label)+'</span>';});
    h+='</div></div>';
  }
  if(avoid.length>0){
    h+='<div><div style="font-size:.7rem;font-weight:700;color:#8a1a1e;margin-bottom:.3rem">&#10007; \u041b\u0443\u0447\u0448\u0435 \u043e\u0442\u043b\u043e\u0436\u0438\u0442\u044c:</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:.3rem">';
    avoid.forEach(function(x){h+='<span style="font-size:.68rem;background:rgba(138,26,30,.08);color:#8a1a1e;border-radius:4px;padding:.15rem .45rem">'+x.cat.icon+' '+esc(x.cat.label)+'</span>';});
    h+='</div></div>';
  }
  h+='</div>';
  return {html:h,score:score};
}

function buildCalendar(){
  if(S.mode!=='calendar') return '';
  var city=CITIES[S.cIdx];
  var yr=S.calYear, mo=S.calMonth;
  var monthNames=['\u042f\u043d\u0432\u0430\u0440\u044c','\u0424\u0435\u0432\u0440\u0430\u043b\u044c','\u041c\u0430\u0440\u0442','\u0410\u043f\u0440\u0435\u043b\u044c','\u041c\u0430\u0439','\u0418\u044e\u043d\u044c','\u0418\u044e\u043b\u044c','\u0410\u0432\u0433\u0443\u0441\u0442','\u0421\u0435\u043d\u0442\u044f\u0431\u0440\u044c','\u041e\u043a\u0442\u044f\u0431\u0440\u044c','\u041d\u043e\u044f\u0431\u0440\u044c','\u0414\u0435\u043a\u0430\u0431\u0440\u044c'];
  var daysInMonth=new Date(yr,mo+1,0).getDate();
  var firstDow=(new Date(yr,mo,1).getDay()+6)%7; // Mon=0

  // Precompute all days + event slots if event selected
  var hasEv=canCalc();
  var ev2=hasEv?resolveEv():null;
  var days=[];
  for(var d=1;d<=daysInMonth;d++){
    var ds=yr+'-'+(mo+1<10?'0':'')+(mo+1)+'-'+(d<10?'0':'')+d;
    var p=calcP(ds,12,city);
    var de=buildDayEnergy(p);
    var daySlots=null, goodWindows=0;
    if(hasEv&&ev2){
      daySlots=getDaySlots(ds,city,ev2);
      goodWindows=daySlots.filter(function(x){return !x.block&&x.s>=3.5;}).length;
    }
    days.push({d:d,ds:ds,p:p,score:de.score,slots:daySlots,goodWindows:goodWindows});
  }

  var h='<div class="card">';
  // Nav
  h+='<div class="cal-nav">';
  h+='<button data-caldir="-1">&#9664; Пред.</button>';
  h+='<div style="font-size:.9rem;font-weight:700;color:#6e2806">'+monthNames[mo]+' '+yr+'</div>';
  h+='<button data-caldir="1">След. &#9654;</button>';
  h+='</div>';
  // Day headers Mon-Sun
  ['\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431','\u0412\u0441'].forEach(function(d){
    h+='<div class="cal-head">'+d+'</div>';
  });
  // Wait — grid starts in cal-grid
  h='<div class="card"><div class="cal-nav"><button data-caldir="-1">&#9664; \u041f\u0440\u0435\u0434.</button><div style="font-size:.9rem;font-weight:700;color:#6e2806">'+monthNames[mo]+' '+yr+'</div><button data-caldir="1">\u0421\u043b\u0435\u0434. &#9654;</button></div>';
  h+='<div class="cal-grid">';
  ['\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431','\u0412\u0441'].forEach(function(d){
    h+='<div class="cal-head">'+d+'</div>';
  });
  // Empty cells
  for(var e=0;e<firstDow;e++) h+='<div class="cal-day empty"></div>';
  // Days
  days.forEach(function(day){
    var sc=day.score;
    var bg=sc>=7?'rgba(30,107,61,.14)':sc>=5?'rgba(90,138,26,.10)':sc>=3?'rgba(200,96,10,.09)':'rgba(138,26,30,.09)';
    var borderC=sc>=7?'rgba(30,107,61,.4)':sc>=5?'rgba(90,138,26,.28)':sc>=3?'rgba(200,96,10,.22)':'rgba(138,26,30,.22)';
    var dotc=sc>=7?'#1e6b3d':sc>=5?'#5a8a1a':sc>=3?'#c8600a':'#8a1a1e';
    var sel=S.selectedDay===day.ds;
    var isToday=day.ds===today;
    h+='<div class="cal-day'+(sel?' sel':'')+' " data-day="'+day.ds+'" style="background:'+bg+';border:1px solid '+(sel?'#c8600a':borderC)+';'+(isToday?'outline:2px solid #c8600a;outline-offset:-2px;':'')+'">'; 
    h+='<div class="cal-num" style="color:'+dotc+';font-weight:700">'+(isToday?'<u>':'')+day.d+(isToday?'</u>':'')+'</div>';
    h+='<div class="cal-dot" style="background:'+dotc+'" title="'+sc.toFixed(1)+'/10"></div>';
    h+='<div class="cal-nak" style="font-size:.55rem;color:'+dotc+';opacity:.9">'+day.p.nakshatra.sym+' '+day.p.nakshatra.name.slice(0,5)+'</div>';
    h+='<div class="cal-ls" style="font-size:.5rem">'+day.p.lunarDay+' л.с. · '+sc.toFixed(1)+'</div>';
    h+='<div class="cal-ls" style="font-size:.5rem">'+day.p.lunarDay+' л.с. · '+sc.toFixed(1)+'</div>';
    if(hasEv){if(day.goodWindows>0){h+='<div style="font-size:.5rem;color:#1e6b3d;font-weight:700;margin-top:1px">✶ '+day.goodWindows+' окн.</div>';}else{h+='<div style="font-size:.48rem;color:rgba(138,26,30,.45);margin-top:1px">— нет окон</div>';}}
    h+='</div>';
  });
  h+='</div>'; // cal-grid
  h+='<div class="cal-legend">';
  h+='<span><span style="width:10px;height:10px;border-radius:50%;background:#1e6b3d;display:inline-block"></span>Отличная (&ge;7)</span>';
  h+='<span><span style="width:10px;height:10px;border-radius:50%;background:#5a8a1a;display:inline-block"></span>Хорошая (5–7)</span>';
  h+='<span><span style="width:10px;height:10px;border-radius:50%;background:#c8600a;display:inline-block"></span>Нейтральная (3–5)</span>';
  h+='<span><span style="width:10px;height:10px;border-radius:50%;background:#8a1a1e;display:inline-block"></span>Слабая (&lt;3)</span>';
  h+='</div>';
  h+='<div style="font-size:.65rem;color:#9e7840;margin-top:.4rem;padding:.35rem .5rem;background:rgba(158,120,64,.07);border-radius:5px">&#9432; Цвет = общая энергия дня (накшатра + титхи). Наличие благоприятных окон зависит от Раху Кала и Гулика — кликните на день для деталей.</div>';
  h+='</div>'; // card

  // Selected day detail
  if(S.selectedDay){
    var sel2=days.find(function(x){return x.ds===S.selectedDay;});
    if(sel2){
      h+='<div class="card">';
      h+='<div class="ct">&#128197; '+esc(fmtDate(S.selectedDay))+'</div>';
      h+=buildDayDetailInline(sel2);
      h+='</div>';
    }
  }
  return h;
}

function updateProgress(){
  var pf=document.querySelector('#muh .prog-fill');

// --- CALCULATIONS -------------------------------------------------------------
function doSingle(){
  var city=CITIES[S.cIdx];
  var parts=S.time.split(':');
  var lh=+parts[0]+(+parts[1])/60;
  var p=calcP(S.date,lh,city);
  var cs=scoreSlot(lh,p,resolveEv());
  var slots=getDaySlots(S.date,city,resolveEv());
  S.singleRes={p:p,cs:cs,slots:slots,city:city,ev:resolveEv(),date:S.date,time:S.time};
  S.busy=false;
  render();
}

function doRange(){
  var city=CITIES[S.cIdx];
  var ev=resolveEv();
  var cur=new Date(S.rangeStart);
  var end=new Date(S.rangeEnd);
  var totalDays=Math.round((end-cur)/(86400000))+1;

  var allDates=[];
  var c2=new Date(S.rangeStart);
  while(c2<=end){allDates.push(c2.toISOString().split('T')[0]);c2.setDate(c2.getDate()+1);}
  var results=[];
  var i=0;

  function chunk(){
    var end2=Math.min(i+4,allDates.length);
    for(var j=i;j<end2;j++){
      var ds=allDates[j];
      var slots=getDaySlots(ds,city,ev);
      var good=slots.filter(function(x){return !x.block&&x.s>=4;}).sort(function(a,b){return b.s-a.s;});
      var best=good[0]||null;
      var p2=calcP(ds,12,city);
      var de=buildDayEnergy(p2);

      // Apply advanced filters
      var f=S.filter;
      var pass=true;
      if(f.tithis.length>0 && f.tithis.indexOf(p2.tIdx)<0) pass=false;
      if(f.naks.length>0 && f.naks.indexOf(p2.nIdx)<0) pass=false;
      if(f.varas.length>0 && f.varas.indexOf(p2.dow)<0) pass=false;
      if(f.nakQuals.length>0 && f.nakQuals.indexOf(p2.nakshatra.quality)<0) pass=false;
      if(f.karanas.length>0 && f.karanas.indexOf(p2.kIdx)<0) pass=false;
      if(f.minScore>0 && de.score<f.minScore) pass=false;

      results.push({dateStr:ds,dayScore:best?best.s:0,bestSlot:best,slots:slots,p:p2,passFilter:pass});
    }
    i=end2;
    S.progress=Math.round(i/allDates.length*100);
    if(i<allDates.length){
      updateProgress();
      setTimeout(chunk,0);
    } else {
      var filtered=results.filter(function(r){return r.passFilter;});
      var sorted=filtered.slice().sort(function(a,b){return b.dayScore-a.dayScore;});
      var all=results; // keep all for "all days" view but mark filtered
      S.rangeRes={sorted:sorted,all:all,city:city,ev:ev,totalDays:totalDays,filtered:filtered.length<results.length};
      S.busy=false;S.progress=0;
      render();
    }
  }
  chunk();
}

      var p=this.getAttribute('data-preset');
      var now=new Date(),s=new Date(),e=new Date();
      if(p==='week'){e.setDate(now.getDate()+6);}
      else if(p==='2weeks'){e.setDate(now.getDate()+13);}
      else if(p==='month'){s=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0);}
      else if(p==='nextmonth'){s=new Date(now.getFullYear(),now.getMonth()+1,1);e=new Date(now.getFullYear(),now.getMonth()+2,0);}
      else if(p==='3months'){e.setDate(now.getDate()+89);}
      S.rangeStart=s.toISOString().split('T')[0];
      S.rangeEnd=e.toISOString().split('T')[0];
      S.rangeRes=null;S.selectedDay=null;
      render();
    });
  });

  // Calc buttons
  var btnS=app.querySelector('#btnSingle');
  if(btnS) btnS.addEventListener('click',function(){
    var sd2=app.querySelector('#sDate');
    var st2=app.querySelector('#sTime');
    var sc2=app.querySelector('#sCity');
    var sco2=app.querySelector('#sCountry');
    if(sd2) S.date=sd2.value;
    if(st2) S.time=st2.value;
    if(sco2) S.countryIdx=+sco2.value;
    if(sc2) S.cIdx=+sc2.value;
    S.busy=true;S.singleRes=null;
    render();
    setTimeout(doSingle,20);
  });

  var btnR=app.querySelector('#btnRange');
  if(btnR) btnR.addEventListener('click',function(){
    var rs2=app.querySelector('#rStart');
    var re2=app.querySelector('#rEnd');
    var rc2=app.querySelector('#rCity');
    var rco2=app.querySelector('#rCountry');
    if(rs2) S.rangeStart=rs2.value;
    if(re2) S.rangeEnd=re2.value;
    if(rco2) S.countryIdx=+rco2.value;
    if(rc2) S.cIdx=+rc2.value;
    S.busy=true;S.rangeRes=null;S.selectedDay=null;S.progress=0;
    render();
    setTimeout(doRange,20);
  });

  // Day cards
  // Birth profile toggle
  var bt=app.querySelector('#birthToggle');
  if(bt) bt.addEventListener('click',function(){S.birthOpen=!S.birthOpen; render();});

  // Birth fields — blur to avoid re-render while typing
  var bDate=app.querySelector('#birthDate');
  if(bDate) bDate.addEventListener('blur',function(){
    S.birth.date=this.value;
    S.birthNak=computeBirthNak();
    render();
  });
  var bTime=app.querySelector('#birthTime');
  if(bTime) bTime.addEventListener('blur',function(){
    S.birth.time=this.value;
    S.birthNak=computeBirthNak();
    render();
  });
  var bCity=app.querySelector('#birthCity');
  if(bCity) bCity.addEventListener('change',function(){
    S.birth.cIdx=+this.value;
    S.birthNak=computeBirthNak();
    render();
  });
  // Slot accordion
  app.querySelectorAll("[data-slot]").forEach(function(el){
    el.addEventListener("click",function(e){
      e.stopPropagation();
      var id=this.getAttribute("data-slot");
      S.openSlot=S.openSlot===id?null:id;
      var sy=window.scrollY||window.pageYOffset||0;
      render();
      window.scrollTo(0,sy);
    });
  });

  app.querySelectorAll('[data-caldir]').forEach(function(el){
    el.addEventListener('click',function(){
      var dir=+this.getAttribute('data-caldir');
      S.calMonth+=dir;
      if(S.calMonth>11){S.calMonth=0;S.calYear++;}
      if(S.calMonth<0){S.calMonth=11;S.calYear--;}
      S.selectedDay=null;
      render();
    });
  });

  app.querySelectorAll('[data-day]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var d=this.getAttribute('data-day');
      var wasSelected=S.selectedDay===d;
      S.selectedDay=wasSelected?null:d;
      var sy=window.scrollY||window.pageYOffset||0;
      render();
      // Only restore scroll if closing, not opening
      if(wasSelected) window.scrollTo(0,sy);
    });
  });
}

// --- INIT ---------------------------------------------------------------------
render();

})();
</script>
</body>
</html>
